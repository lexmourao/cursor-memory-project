# Starter reverse-proxy config for local/single-VM deployments.
# Production deployments should use managed TLS, stronger authentication,
# rate limiting, hardened TLS settings, structured logs, monitoring,
# and environment-specific firewall controls.

events {}

http {
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    auth_basic "Protected";
    auth_basic_user_file /etc/nginx/htpasswd;

    location / {
      proxy_pass http://memory:7331;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
